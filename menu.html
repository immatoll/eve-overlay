<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/menu.css">
    <style>
        /* Dim and disable interaction for the menu while modal is open */
        .menu.dimmed {
            filter: brightness(.15);
            transition: filter 150ms ease;
            pointer-events: none;
            user-select: none;
            opacity: 1;
        }

        /* Make the custom modal more visible and animated */
        #customModal {
            display: none;
            position: fixed;
            left: 10px;
            top: 42px;
            width: 165px;
            background: rgba(12,16,20,0.98);
            border: 1px solid rgba(60,140,180,0.14);
            padding: 12px;
            z-index: 120;
            box-shadow: 0 18px 60px rgba(0,0,0,0.65), 0 0 18px rgba(60,140,180,0.08);
            transform-origin: left top;
            transform: translateY(-8px) scale(0.98);
            opacity: 0;
            transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
        }

        #customModal.open {
            display: block;
            transform: translateY(0) scale(1);
            opacity: 1;
            box-shadow: 0 26px 80px rgba(0,0,0,0.72), 0 0 28px rgba(60,140,180,0.12);
        }

        /* Accent the header and action button inside the modal for visibility */
        #customModal > div:first-child { color: #bfe6ff }
        #modalAddBtn { background: linear-gradient(180deg,#2b6b88,#1f556f) }
            /* Styled checkbox matching modal inputs */
            #modalIsRemote {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                border: 1px solid rgba(255,255,255,0.04);
                background: rgba(255,255,255,0.02);
                border-radius: 3px;
                display: inline-block;
                vertical-align: middle;
                position: relative;
                box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
                cursor: pointer;
            }

            #modalIsRemote:focus { outline: 1px solid rgba(47,160,200,0.15) }

            #modalIsRemote:checked {
                background: linear-gradient(180deg,#2fa9d9,#176079);
                border-color: rgba(40,120,160,0.9);
                box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
            }

            /* no checkmark glyph — color indicates state */

            /* Tooltip for informative labels */
            .tooltip {
                position: relative;
                border-bottom: 1px dashed rgba(185,199,211,0.35);
                cursor: help;
                display: inline-block;
            }

            .tooltip .tooltiptext {
                visibility: hidden;
                opacity: 0;
                position: absolute;
                left: 0;
                bottom: 125%;
                transform: translateY(-6px);
                background: rgba(6,10,14,0.95);
                color: #cfe9f8;
                padding: 6px 8px;
                border-radius: 6px;
                white-space: nowrap;
                font-size: 11px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.6);
                transition: opacity 120ms ease, transform 120ms ease;
                z-index: 220;
            }

            .tooltip:hover .tooltiptext {
                visibility: visible;
                opacity: 1;
                transform: translateY(0);
            }
    </style>
</head>

<body>

    <div class="titlebar">

        <div class="title">
            SILVER.OVERLAY
        </div>

        <div class="windowButtons">

            <svg id="openCustomEditor" class="windowBtn" title="Add custom menu item" viewBox="0 0 24 24"
                style="margin-left:6px;" xmlns="http://www.w3.org/2000/svg">
                <rect x="11" y="4" width="2" height="16" fill="#cfd8dc" />
                <rect x="4" y="11" width="16" height="2" fill="#cfd8dc" />
            </svg>

            <svg class="windowBtn" onclick="minimize()" viewBox="0 0 24 24">
                <rect x="4" y="11" width="16" height="2" fill="#cfd8dc" />
            </svg>


            <svg class="windowBtn" onclick="closeWin()" viewBox="0 0 24 24">
                <line x1="5" y1="5" x2="19" y2="19" stroke="#cfd8dc" stroke-width="2" />
                <line x1="19" y1="5" x2="5" y2="19" stroke="#cfd8dc" stroke-width="2" />
            </svg>

        </div>

    </div>

        <div class="menuItem" onclick="openOverlay('SILVER STARMAP', 'https://silver-tribe.com/ssu', false)">

                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>

            </svg>
            EF-MAP.COM
        </div>
        <div class="menuItem" onclick="openOverlay('EVE|DATACORE', 'https://evedataco.re/explore/characters/')">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="14" x2="23" y2="14"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="14" x2="4" y2="14"></line>

            EVE|DATACO.RE

        <div class="menuItem" onclick="openOverlay('Alpha Strike', 'https://frontier.alpha-strike.space/')">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="3"></circle>
                <circle cx="6" cy="18" r="3"></circle>
                <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
            </svg>
            ALPHA-STRIKE.SPACE
        </div>
        <hr>
        <div class="menuItem" id="noCustom">
            <span style="color:#777777">No custom items yet. Click the + button in the titlebar to add your own links.</span>
        </div>
    </div>

    <!-- floating button removed; control moved into titlebar -->

    <!-- Modal popup for adding custom menu items -->
    <div id="customModal">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
            <div style="font-size:13px; color:#9fb3c8;">Add menu item</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <input id="modalCustomName" placeholder="Name"
                style="padding:8px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); color:inherit" />
            <input id="modalCustomUrl" placeholder="'http://..' or 'test.html'"
                style="padding:8px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); color:inherit" />
            <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:#b8c7d3;">
                <input id="modalIsRemote" type="checkbox" />
                <span class="tooltip">Try borderless mode
                    <span class="tooltiptext">Disabled CORS, may<br>not work with all sites</span>
                </span>
            </label>
            <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button id="modalAddBtn"
                    style="padding:6px 10px; background:#2b6b88; border:none; color:white; border-radius:6px; cursor:pointer">Add</button>
                <button id="modalCancelBtn"
                    style="padding:6px 10px; background:transparent; border:1px solid rgba(255,255,255,0.04); color:#b8c7d3; border-radius:6px; cursor:pointer">Cancel</button>
            </div>
        </div>
    </div>


    <script>
        const { ipcRenderer } = require("electron")

        function minimize() {
            ipcRenderer.send("window:minimize")
        }

        function closeWin() {
            ipcRenderer.send("window:close")
        }

        function openOverlay(title, url = "", isRemote = true) {
            ipcRenderer.send("menu:openOverlay", { title, url, isRemote })
        }

        // --- Custom menu items API (persists to localStorage) ---
        const CUSTOM_KEY = 'si_custom_menu'

        function createMenuItemElement(item) {
            const el = document.createElement('div')
            el.className = 'menuItem'
            el.innerHTML = `
                <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="#cfd8dc" /></svg>
                <span class="customLabel"></span>
                <button class="removeBtn" title="Remove" style="margin-left:auto; background:transparent; border:none; color:rgba(255,255,255,0.5);">✖</button>
            `
            el.querySelector('.customLabel').textContent = item.name
            el.addEventListener('click', (e) => {
                // avoid triggering when clicking remove button
                if (e.target && e.target.classList && e.target.classList.contains('removeBtn')) return
                openOverlay(item.name, item.url, !!item.isRemote)
            })
            el.querySelector('.removeBtn').addEventListener('click', (ev) => {
                ev.stopPropagation()
                removeCustomItem(item.name, item.url)
            })
            return el
        }

        function loadCustomItems() {
            try {
                const raw = localStorage.getItem(CUSTOM_KEY)
                return raw ? JSON.parse(raw) : []
            } catch (e) { return [] }
        }

        function saveCustomItems(list) {
            localStorage.setItem(CUSTOM_KEY, JSON.stringify(list || []))
        }

        function renderCustomItems() {
            const list = loadCustomItems()
            // insert before the custom UI area (find .menu and append)
            const menu = document.querySelector('.menu')
            // remove previous custom items (data-custom)
            if (menu) menu.querySelectorAll('[data-custom="1"]').forEach(n => n.remove())
            list.forEach(item => {
                const el = createMenuItemElement(item)
                el.setAttribute('data-custom', '1')
                if (menu) menu.appendChild(el)
            })

            // show/hide the "no custom" placeholder
            const noCustom = document.getElementById('noCustom')
            if (noCustom) {
                if (list.length > 0) noCustom.style.display = 'none'
                else noCustom.style.display = ''
            }
        }

        function addCustomItem(name, url, isRemote = true) {
            if (!name || !url) return false
            const list = loadCustomItems()
            list.push({ name: String(name), url: String(url), isRemote: !!isRemote })
            saveCustomItems(list)
            renderCustomItems()
            return true
        }

        function removeCustomItem(name, url) {
            let list = loadCustomItems()
            list = list.filter(i => !(i.name === name && i.url === url))
            saveCustomItems(list)
            renderCustomItems()
        }

        // wire the popup UI
        document.addEventListener('DOMContentLoaded', () => {
            renderCustomItems()
            const openBtn = document.getElementById('openCustomEditor')
            const noCustomBtn = document.getElementById('noCustom')
            const modal = document.getElementById('customModal')
            const cancelBtn = document.getElementById('modalCancelBtn')
            const addBtn = document.getElementById('modalAddBtn')
            const nameIn = document.getElementById('modalCustomName')
            const urlIn = document.getElementById('modalCustomUrl')
            const remoteIn = document.getElementById('modalIsRemote')

            const menuEl = document.querySelector('.menu')

            function showModal() {
                if (!modal) return
                modal.style.display = 'block'
                // allow CSS transition by adding class after display set
                requestAnimationFrame(() => modal.classList.add('open'))
                nameIn.focus()
                if (remoteIn) remoteIn.checked = false
                if (menuEl) menuEl.classList.add('dimmed')
            }

            function hideModal() {
                if (!modal) return
                modal.classList.remove('open')
                // wait for the close transition then hide
                setTimeout(() => { modal.style.display = 'none' }, 180)
                nameIn.value = ''
                urlIn.value = ''
                if (remoteIn) remoteIn.checked = false
                if (menuEl) menuEl.classList.remove('dimmed')
            }

            if (openBtn) openBtn.addEventListener('click', showModal)
            if (noCustomBtn) noCustomBtn.addEventListener('click', showModal)
            if (cancelBtn) cancelBtn.addEventListener('click', hideModal)

            if (addBtn) addBtn.addEventListener('click', () => {
                const name = nameIn.value.trim()
                const url = urlIn.value.trim()
                if (!name || !url) return
                const isRemote = !remoteIn.checked
                addCustomItem(name, url, isRemote)
                hideModal()
            })
        })
    </script>

</body>

</html>
