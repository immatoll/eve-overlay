<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>EVE System Viewer</title>
    <style>
        /* ---------- General dark theme ---------- */
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "EveSans", sans-serif;
            color: #cfd8dc;
            background: rgba(14, 21, 32);
            display: flex;
            flex-direction: column;
            letter-spacing: 0.5px;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            font-size: 13px;
            gap: 10px;
            padding: 5px 12px;
            background: rgb(23, 34, 52);
            border-bottom: 1px solid rgb(40, 60, 80);
            flex: 0 0 auto;
            min-height: 20px;
        }

        content {
            padding: 20px 10px 0 10px;
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: auto;
            scrollbar-color: rgb(60, 80, 100) rgb(23, 34, 52);
            scrollbar-width: thin;
        }

        content::-webkit-scrollbar {
            width: 10px;
        }

        content::-webkit-scrollbar-track {
            background: rgb(23, 34, 52);
        }

        content::-webkit-scrollbar-thumb {
            background: rgb(60, 80, 100);
            border-radius: 5px;
        }

        content::-webkit-scrollbar-thumb:hover {
            background: rgb(80, 100, 120);
        }

        footer {
            display: flex;
            align-items: center;
            font-size: 13px;
            gap: 10px;
            padding: 5px 12px;
            min-height: 20px;
            background: rgb(23, 34, 52);
            border-top: 1px solid rgb(40, 60, 80);
        }

        h2,
        h3 {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 1.5px;
        }

        /* ---------- Helper ---------- */
        .inline {
            display:inline-flex; 
            align-items:center;
            line-height:1;
        }

        /* ---------- WebSocket status ---------- */
        #wsStatus {
            font-size: 13px;
        }

        #wsStatusDot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .ws-connected {
            background: limegreen;
        }

        .ws-disconnected {
            background: red;
        }

        .ws-connecting {
            background: orange;
        }

        /* ---------- System input panel ---------- */
        #systemPanel {
            align-items: center;
            width: calc(100% - 20px);
            margin: 10px 0;
        }

        #systemInput {
            padding: 2px 4px;
            border: 1px solid rgb(40, 60, 80);
            background: rgba(14, 21, 32);
            color: #cfd8dc;
            width: 80px;
            font-size: 14px;
            font-family: inherit;
        }

        #systemInput::placeholder {
            color: #666;
        }

        #systemInput:focus {
            outline: none;
            border-color: rgb(100, 150, 200);
            background: rgba(0, 0, 0, 0.5);
        }

        .autocomplete-suggestions {
            display: none;
            max-height: 150px;
            width: 200px;
            top: 40px;
            left: 20px;
            background: rgb(23, 34, 52);
            border: 1px solid rgb(40, 60, 80);
            overflow-y: auto;
            z-index: 10;
            position: absolute;
            scrollbar-color: rgb(60, 80, 100) rgb(23, 34, 52);
            scrollbar-width: thin;
            transition: 0.2s;
        }

        .autocomplete-suggestion {
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgb(40, 60, 80);
        }

        .autocomplete-suggestion:hover {
            filter: brightness(1.5);
        }


        /* ---------- History list ---------- */
        .history-list {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .history-item {
            cursor: pointer;
        }

        .history-item:hover {
            color: white;
        }

        /* ---------- Flags as colored badges ---------- */
        #flags {
            display: flex;
            flex-direction: column;
        }

        .flag-badge {
            border: 1px solid rgb(40, 60, 80);
            display: flex;
            justify-content: center;
            align-items: center;;
            padding: 8px 5px 5px 5px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            transition: 0.2s;
            font-size: 13px;
            text-transform: uppercase;
        }

        .flag-badge.green {
            background-color: rgba(100, 150, 200, 0.4);
        }

        .flag-badge.red {
            background-color: rgba(100, 150, 200, 0.1);
        }

        .flag-badge:hover {
            filter: brightness(1.2);
        }

        .category-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .category-container h3 {
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .category-badges {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 5px;
        }
    </style>
    <link rel="stylesheet" href="css/fonts.css">
</head>

<body>
    
    <header> 
            <span class="inline">System:</span>
            <input type="text" id="systemInput" placeholder="Search System..." autocomplete="off">
            <span class="inline">Last:</span>
            <span class="history-list inline" id="historyList"></span>
    </header>
<div id="suggestions" class="autocomplete-suggestions"></div>
    <content>
        <div id="flags"></div>
    </content>
    <footer>
        <div style="display:flex;gap:6px; align-items: center; ">
            <div id="wsStatusDot" class="inline"></div>
            <div id="wsStatus" class="inline">disconnected</div>
        </div>
    </footer>

    <script>
        let systemsByName = {}
        let systemsById = {}
        let flagLabels = {}
        let currentSystemId = null
        let history = []

        const input = document.getElementById("systemInput")
        const suggestionsDiv = document.getElementById("suggestions")
        const historyDiv = document.getElementById("historyList")
        const flagsDiv = document.getElementById("flags")
        const status = document.getElementById("wsStatus")
        const statusDot = document.getElementById("wsStatusDot")

        // ---------- Load system labels ----------
        fetch("data/labels_systems.json").then(r => r.json()).then(data => {
            for (const id in data) {
                const name = data[id]
                systemsByName[name] = id
                systemsById[id] = name
            }
        })

        // ---------- Load flag labels ----------
        fetch("data/labels_flags.json").then(r => r.json()).then(data => {
            flagLabels = data
            generateCategorizedFlags()
        })

        // ---------- Generate categorized flags ----------
        function generateCategorizedFlags(data = {}) {
            flagsDiv.innerHTML = ""

            for (const category in flagLabels) {
                const categoryContainer = document.createElement("div")
                categoryContainer.className = "category-container"

                const title = document.createElement("h3")
                title.textContent = category
                categoryContainer.appendChild(title)

                const badgeContainer = document.createElement("div")
                badgeContainer.className = "category-badges"

                const categoryFlags = flagLabels[category]
                for (const column in categoryFlags) {
                    const labelText = categoryFlags[column]
                    const span = document.createElement("span")
                    span.className = "flag-badge red"
                    span.dataset.column = column
                    span.textContent = `${labelText}`

                    // toggle on click
                    span.addEventListener("click", async () => {
                        if (!currentSystemId) return
                        const isActive = span.classList.contains("green")
                        const newValue = !isActive
                        await fetch(`http://localhost:9500/system/${currentSystemId}/toggle`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ column: column, value: newValue })
                        })
                        span.classList.remove(isActive ? "green" : "red")
                        span.classList.add(newValue ? "green" : "red")
                        span.textContent = `${labelText}`
                    })

                    badgeContainer.appendChild(span)
                }

                categoryContainer.appendChild(badgeContainer)
                flagsDiv.appendChild(categoryContainer)
            }

            if (Object.keys(data).length) updateFlags(data)
        }

        // ---------- Update flag badge colors ----------
        function updateFlags(systemData) {
            const badges = document.querySelectorAll("#flags .flag-badge")
            badges.forEach(badge => {
                const column = badge.dataset.column
                const value = systemData[column]
                const isActive = value === 1 || value === "1" || value === true || value === "true"
                badge.classList.remove("green", "red")
                badge.classList.add(isActive ? "green" : "red")
                badge.textContent = `${flagLabels[getCategory(column)][column]}`
            })
        }

        // Helper to find category by column
        function getCategory(column) {
            for (const category in flagLabels) {
                if (column in flagLabels[category]) return category
            }
            return null
        }

        // ---------- Load system flags ----------
        async function loadSystemData(systemId) {
            currentSystemId = systemId
            const response = await fetch(`http://localhost:9500/system/${systemId}`)
            const data = await response.json()
            updateFlags(data)
        }

        // ---------- Autocomplete & history ----------
        function updateSuggestions() {
            const val = input.value.toLowerCase()
            suggestionsDiv.innerHTML = ""
            suggestionsDiv.style.display = val ? "block" : "none"
            if (!val) return
            const matches = Object.keys(systemsByName).filter(name => name.toLowerCase().includes(val))
            matches.forEach(name => {
                const div = document.createElement("div")
                div.textContent = name + ` (${systemsByName[name]})`
                div.className = "autocomplete-suggestion"
                div.addEventListener("click", () => selectSystem(name))
                suggestionsDiv.appendChild(div)
            })
        }

        function updateHistory() {
            historyDiv.innerHTML = ""
            history.slice(-5).reverse().forEach(name => {
                const div = document.createElement("div")
                div.textContent = name
                div.className = "history-item"
                div.addEventListener("click", () => selectSystem(name))
                historyDiv.appendChild(div)
            })
        }

        function selectSystem(name) {
            input.value = name
            suggestionsDiv.innerHTML = ""
            suggestionsDiv.style.display = "none"
            const id = systemsByName[name]
            if (!id) return
            loadSystemData(id)
            if (!history.includes(name)) history.push(name)
            updateHistory()
        }

        input.addEventListener("input", updateSuggestions)

        // ---------- WebSocket ----------
        let ws
        function setStatus(text, cls) {
            status.textContent = text
            statusDot.className = cls
        }
        function connectWebSocket() {
            setStatus("connecting", "ws-connecting")
            ws = new WebSocket("ws://localhost:9001")
            ws.onopen = () => setStatus("connected (System tracking active)", "ws-connected")
            ws.onerror = () => setStatus("error", "ws-disconnected")
            ws.onclose = () => {
                setStatus("disconnected", "ws-disconnected")
                setTimeout(connectWebSocket, 3000)
            }
            ws.onmessage = event => {
                const data = JSON.parse(event.data)
                const name = data.system
                const id = data.system_id
                input.value = name
                loadSystemData(id)
                if (!history.includes(name)) history.push(name)
                updateHistory()
            }
        }
        connectWebSocket()
    </script>
</body>

</html>
